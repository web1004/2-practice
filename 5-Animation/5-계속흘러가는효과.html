<!DOCTYPE html>

<body>

      <span>Text that flows from right to left.</span>
      <span>Text that flows from right to left.</span>
      <span>Text that flows from right to left.</span>

        <img src="image/slide_logo_jb.png" alt="slide">

        <img src="image/slide_logo_wr.png" alt="slide">
